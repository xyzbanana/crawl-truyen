services:
  - type: web
    name: comic-scraper-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free # Chỉ định dùng gói Free của Render
    envVars:
      - key: PYTHON_VERSION
			value: 3.10.0 # Định nghĩa phiên bản Python bạn muốn chạy